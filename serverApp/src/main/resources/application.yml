spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/evmap
    username: evmap
    password: evmap
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: ${MAIL_SMTP_AUTH:false}
      mail.smtp.starttls.enable: ${MAIL_SMTP_STARTTLS:false}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.default_schema: evmap
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    schemas: evmap

app:
  media:
    root: ${APP_MEDIA_ROOT:./storage/media}
  mail:
    from: ${APP_MAIL_FROM:no-reply@evmap.local}
